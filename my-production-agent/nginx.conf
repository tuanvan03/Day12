events { worker_connections 256; }

http {
    # Docker DNS resolver to automatically find all scaled agent instances
    resolver 127.0.0.11 valid=10s;

    upstream agent_backend {
        server agent:8000;
        keepalive 16;
    }

    server {
        listen 80;

        # Header to explicitly show which instance served the request
        add_header X-Served-By $upstream_addr always;

        location / {
            proxy_pass http://agent_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Robust load balancing: automatically retry if a backend fails
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 3;
        }

        location /health {
            proxy_pass http://agent_backend/health;
            access_log off;
        }
    }
}
