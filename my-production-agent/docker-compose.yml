version: '3.8'

services:
  agent:
    build: .
    environment:
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - AGENT_API_KEY=secret
      - RATE_LIMIT_PER_MINUTE=10
      - MONTHLY_BUDGET_USD=10.0
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
